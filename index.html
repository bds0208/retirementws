<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retirement Worksheet - Dual Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; }
    #persisted-data { display: none; }
    .lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .04em; color: #4b5563; font-weight: 700; }
    @media print {
      .no-print { display: none !important; }
      body { background: white !important; }
      .print-full { max-width: 100% !important; box-shadow: none !important; border: none !important; }
    }
  </style>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script id="persisted-data" type="application/json"></script>

  <script type="text/babel">
    const { useMemo, useState, useEffect } = React;

    // =========================
    // Configuration
    // =========================
    const DEFAULT_ADMIN_CONFIG = {
      payrollMode: "semiMonthlyFixed",
      semiMonthlyBoundaries: { firstHalfEndDay: 15, secondHalfEnd: "monthEnd" },
      payCalendarTable: [],
      employerLegacyExtendedCoverageHireDate: "2003-02-15",
      employerLegacyCoverageExtensionDays: 14,
      agencyParticipatesInProgramI: true,
      allowLowerLevelPlanAtRetirement: false,
      useSamePlanOnlyIfLowerLevelUnknown: true,
      enableLineOfDutySpouseRule: true,
      earlyRetireePlanCatalog: {
        "Traditional Plan - Advantage Network": {
          order: 2,
          tiers: {
            Single: { first18Months: { retireeShare: 180, stateShare: 620, total: 800 }, after18Months: { retireeShare: 220, stateShare: 580, total: 800 } },
            Double: { first18Months: { retireeShare: 320, stateShare: 980, total: 1300 }, after18Months: { retireeShare: 400, stateShare: 900, total: 1300 } },
            Family: { first18Months: { retireeShare: 430, stateShare: 1370, total: 1800 }, after18Months: { retireeShare: 520, stateShare: 1280, total: 1800 } }
          }
        },
        "Traditional Plan - Summit Network": {
          order: 3,
          tiers: {
            Single: { first18Months: { retireeShare: 210, stateShare: 640, total: 850 }, after18Months: { retireeShare: 250, stateShare: 600, total: 850 } },
            Double: { first18Months: { retireeShare: 360, stateShare: 1040, total: 1400 }, after18Months: { retireeShare: 450, stateShare: 950, total: 1400 } },
            Family: { first18Months: { retireeShare: 480, stateShare: 1420, total: 1900 }, after18Months: { retireeShare: 580, stateShare: 1320, total: 1900 } }
          }
        },
        "Consumer Plus - Summit Network": {
          order: 1,
          tiers: {
            Single: { first18Months: { retireeShare: 150, stateShare: 550, total: 700 }, after18Months: { retireeShare: 190, stateShare: 510, total: 700 } },
            Double: { first18Months: { retireeShare: 300, stateShare: 900, total: 1200 }, after18Months: { retireeShare: 370, stateShare: 830, total: 1200 } },
            Family: { first18Months: { retireeShare: 410, stateShare: 1290, total: 1700 }, after18Months: { retireeShare: 500, stateShare: 1200, total: 1700 } }
          }
        }
      },
      medicareSupplementCatalog: {
        "Plan 100": { monthly: 220 },
        "Plan 75": { monthly: 170 },
        "Plan 50": { monthly: 130 }
      },
      pharmacyCatalog: {
        "Enhanced": { monthly: 65 }
      }
    };

    const TIER_ALIAS = {
      "Self": "Single",
      "Self & Dependent": "Double",
      "Self + Family": "Family",
      "Single": "Single",
      "Double": "Double",
      "Family": "Family"
    };

    const baseForm = {
      personnelNumber: "", employeeName: "", empSSN: "", eeGroup: "", spouseName: "", declineCoverage: false, isDeathBenefit: false,
      retirementDate: "", lastDayPaid: "", hireDate: "", birthDate: "", payRate: "", ppEndDate: "", medPlan: "", medCoverage: "", deptUnit: "", deptName: "", planEndDate: "",
      coverageMonthsAtRetirement: "", manualCoverageMonthsInput: "", employeeAgeRetirement: "", spouseAgeRetirement: "", spouseSSN: "", spouseFirstName: "", spouseLastName: "", spouseBirthDate: "",
      existingCoverageEndDate: "", extendedCoverageEndDate: "", ee65thBirthday: "", spouse65thBirthday: "", eeMedicareEligibleDate: "", spouseMedicareEligibleDate: "",
      monthsToEEMedicare: "", monthsToSpouseMedicare: "", remainingCoverageMonths: "", dependents: [], statePaidPEHPEndDate: "",
      s4_ee_monthsUsed: "", s4_ee_beginDate: "", s4_ee_endDate: "", s4_ee_medPlan: "", s4_ee_medCoverage: "",
      s4_sp_monthsUsed: "", s4_sp_beginDate: "", s4_sp_endDate: "", s4_sp_medPlan: "", s4_sp_medCoverage: "",
      s5_ee_monthsUsed: "", s5_ee_beginDate: "", s5_ee_endDate: "", s5_ee_medPlan: "", s5_ee_medPharmacy: "",
      s5_sp_monthsUsed: "", s5_sp_beginDate: "", s5_sp_endDate: "", s5_sp_medPlan: "", s5_sp_medPharmacy: "",
      calculationMode: "manual-months",
      program1SickHours: "", program1ConvertedHours: "", program2SickHours: "", program2ConvertedHours: "", program3SickHours: "",
      hourlyRateAtRetirement: "", rateFor401kValuation: "", avgRetireeRatePreviousCalendarYear: "", annual401kLimit: "", currentYear401kContributionsEmployee: "", currentYear401kContributionsEmployer: "",
      remaining401kRoomOverride: "", final401kContributionAmountOverride: "", agencyParticipatesInProgramI: true,
      eeHasMedicarePartA: false, eePartAEffectiveDate: "", eeHasMedicarePartB: false, eePartBEffectiveDate: "", eeHasEarlyMedicareDisability: false,
      spouseHasMedicarePartA: false, spousePartAEffectiveDate: "", spouseHasMedicarePartB: false, spousePartBEffectiveDate: "", spouseHasEarlyMedicareDisability: false,
      pehpEnrollmentReceivedDateEmployee: "", pehpEnrollmentReceivedDateSpouse: "",
      programIHoursUsedFor401k: "", programIIHoursUsedFor401k: "", programIValueUsedFor401k: "", programIIValueUsedFor401k: "", final401kContributionAmount: "",
      remainingProgramIHoursAfter401k: "", remainingProgramIIHoursAfter401k: "", hraValuationRateUsed: "", hraDepositAmount: "", equivalentCoverageMonthsEstimate: "",
      assumptionsAndWarnings: [], auditTimelineRows: [], adminConfig: DEFAULT_ADMIN_CONFIG,
      runTests: false
    };

    const num = (v) => { const n = parseFloat(v); return Number.isFinite(n) ? n : 0; };

    // =========================
    // Pure Date Helpers
    // =========================
    const parseDate = (s) => {
      if (!s || typeof s !== 'string') return null;
      const d = new Date(s + 'T00:00:00');
      return Number.isNaN(d.getTime()) ? null : d;
    };
    const formatDate = (d) => d ? d.toISOString().slice(0, 10) : "";
    const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate() + n); return x; };
    const addMonths = (d, n) => { const x = new Date(d); const day = x.getDate(); x.setDate(1); x.setMonth(x.getMonth()+n); const mEnd = endOfMonth(x); x.setDate(Math.min(day, mEnd.getDate())); return x; };
    const firstOfMonth = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
    const endOfMonth = (d) => new Date(d.getFullYear(), d.getMonth()+1, 0);
    const calculateAge = (birth, asOf) => {
      if (!birth || !asOf) return "";
      let age = asOf.getFullYear() - birth.getFullYear();
      const hasHadBirthday = (asOf.getMonth() > birth.getMonth()) || (asOf.getMonth() === birth.getMonth() && asOf.getDate() >= birth.getDate());
      if (!hasHadBirthday) age -= 1;
      return age;
    };
    const calculateAge65EligibilityDate = (birth) => {
      if (!birth) return null;
      const sixtyFive = new Date(birth.getFullYear()+65, birth.getMonth(), birth.getDate());
      if (birth.getDate() === 1) return new Date(sixtyFive.getFullYear(), sixtyFive.getMonth()-1, 1);
      return new Date(sixtyFive.getFullYear(), sixtyFive.getMonth(), 1);
    };
    const calculateRetirementDateFromLastDayPaid = (lastDayPaid) => {
      const d = parseDate(lastDayPaid); if (!d) return null;
      if (d.getDate() <= 15) return new Date(d.getFullYear(), d.getMonth(), 16);
      return new Date(d.getFullYear(), d.getMonth()+1, 1);
    };

    // =========================
    // Domain Rule Functions
    // =========================
    const calculateCoverageEndDates = (inputs, adminConfig) => {
      const retire = parseDate(inputs.retirementDate) || calculateRetirementDateFromLastDayPaid(inputs.lastDayPaid);
      if (!retire) return {};

      let ppEndDate = null;
      if (adminConfig.payrollMode === 'semiMonthlyFixed') {
        ppEndDate = retire.getDate() <= adminConfig.semiMonthlyBoundaries.firstHalfEndDay
          ? new Date(retire.getFullYear(), retire.getMonth(), adminConfig.semiMonthlyBoundaries.firstHalfEndDay)
          : endOfMonth(retire);
      } else {
        const tbl = (adminConfig.payCalendarTable || []).map(parseDate).filter(Boolean).sort((a,b)=>a-b);
        ppEndDate = tbl.find(x => x >= retire) || endOfMonth(retire);
      }
      const planEndDate = endOfMonth(ppEndDate);
      let existingCoverageEndDate = new Date(planEndDate);

      const hireDate = parseDate(inputs.hireDate);
      const threshold = parseDate(adminConfig.employerLegacyExtendedCoverageHireDate);
      if (hireDate && threshold && hireDate <= threshold) {
        existingCoverageEndDate = addDays(existingCoverageEndDate, adminConfig.employerLegacyCoverageExtensionDays || 0);
      }

      let extendedCoverageEndDate = existingCoverageEndDate;
      const eeMed = parseDate(inputs.eeMedicareEligibleDate);
      if (eeMed && retire >= eeMed && formatDate(existingCoverageEndDate) !== formatDate(endOfMonth(existingCoverageEndDate))) {
        extendedCoverageEndDate = endOfMonth(existingCoverageEndDate);
      }

      return {
        retirementDate: retire,
        ppEndDate,
        planEndDate,
        existingCoverageEndDate,
        extendedCoverageEndDate
      };
    };

    const determineMedicareActuals = (inputs, fallbackDate, person) => {
      const hasA = !!inputs[person+"HasMedicarePartA"]; const hasB = !!inputs[person+"HasMedicarePartB"];
      const aDate = parseDate(inputs[person+"PartAEffectiveDate"]);
      const bDate = parseDate(inputs[person+"PartBEffectiveDate"]);
      const medicalEligible = (hasA && hasB && aDate && bDate) ? new Date(Math.max(aDate, bDate)) : fallbackDate;
      const pharmacyEligible = (hasA || hasB)
        ? (aDate && bDate ? new Date(Math.min(aDate, bDate)) : (aDate || bDate || fallbackDate))
        : fallbackDate;
      return {
        medicalEligible,
        pharmacyEligible,
        medicalEstimated: !(hasA && hasB && aDate && bDate),
        pharmacyEstimated: !((hasA || hasB) && (aDate || bDate))
      };
    };

    const calculate401kAllocation = ({ p1Hours, p2Hours, rateFor401kValuation, annual401kLimit, currentYear401kContributionsEmployee, currentYear401kContributionsEmployer, remaining401kRoomOverride, final401kContributionAmountOverride }) => {
      const eligibleValue = (p1Hours + p2Hours) * rateFor401kValuation;
      const target401k = eligibleValue * 0.25;
      const availableRoom = remaining401kRoomOverride > 0
        ? remaining401kRoomOverride
        : Math.max(0, annual401kLimit - currentYear401kContributionsEmployee - currentYear401kContributionsEmployer);
      const override = final401kContributionAmountOverride > 0 ? final401kContributionAmountOverride : 0;
      const blockedByCap = override === 0 && target401k > availableRoom;
      const final401k = override > 0 ? override : (blockedByCap ? availableRoom : target401k);

      let remainingContribution = final401k;
      const p2Value = p2Hours * rateFor401kValuation;
      const p2ValueUsed = Math.min(remainingContribution, p2Value);
      remainingContribution -= p2ValueUsed;
      const p1Value = p1Hours * rateFor401kValuation;
      const p1ValueUsed = Math.min(remainingContribution, p1Value);

      return {
        eligibleValue,
        target401k,
        availableRoom,
        final401k,
        blockedByCap,
        programIIValueUsedFor401k: p2ValueUsed,
        programIValueUsedFor401k: p1ValueUsed,
        programIIHoursUsedFor401k: rateFor401kValuation > 0 ? p2ValueUsed / rateFor401kValuation : 0,
        programIHoursUsedFor401k: rateFor401kValuation > 0 ? p1ValueUsed / rateFor401kValuation : 0
      };
    };

    const calculateHraAllocation = ({ remainingP2Hours, hourlyRateAtRetirement, avgRetireeRatePreviousCalendarYear }) => {
      const hraValuationRateUsed = Math.max(hourlyRateAtRetirement, avgRetireeRatePreviousCalendarYear);
      return { hraValuationRateUsed, hraDepositAmount: remainingP2Hours * hraValuationRateUsed };
    };

    const calculateProgramIInsuranceBank = ({ p1Hours, programIHoursUsedFor401k }) => Math.max(0, p1Hours - programIHoursUsedFor401k);

    const getTier = (medCoverage) => TIER_ALIAS[medCoverage] || "Single";

    const isEnrollmentTimely = (receivedDate, triggerDate) => {
      if (!receivedDate) return { timely: true, assumed: true, lateStartDate: null };
      const r = parseDate(receivedDate); if (!r || !triggerDate) return { timely: true, assumed: false, lateStartDate: null };
      const timely = addDays(triggerDate, -30) >= r;
      return { timely, assumed: false, lateStartDate: timely ? null : firstOfMonth(addMonths(r, 1)) };
    };

    const buildCoverageTimeline = ({ startDate, programIHours, inputs, eeMed, spMed, medPlan, medCoverage, medicarePlan, pharmacyPlan, adminConfig }) => {
      const rows = [];
      let cur = firstOfMonth(startDate);
      let hours = programIHours;
      let stopGuard = 600;
      const spouseExists = !!(inputs.spouseFirstName || inputs.spouseName);
      const hasOrdDep = (inputs.dependents || []).some(d => !d.approvedDisabledDependent);
      const hasDisDep = (inputs.dependents || []).some(d => d.approvedDisabledDependent);
      while (hours >= 8 && stopGuard-- > 0) {
        const rowStartDate = new Date(cur);
        const rowEndDate = endOfMonth(cur);

        const eeMedicalEligible = eeMed.medicalEligible && rowStartDate >= firstOfMonth(eeMed.medicalEligible);
        const eePharmEligible = eeMed.pharmacyEligible && rowStartDate >= firstOfMonth(eeMed.pharmacyEligible);
        const spMedicalEligible = spouseExists && spMed.medicalEligible && rowStartDate >= firstOfMonth(spMed.medicalEligible);
        const spPharmEligible = spouseExists && spMed.pharmacyEligible && rowStartDate >= firstOfMonth(spMed.pharmacyEligible);

        let employeeCoverageType = "none";
        let spouseCoverageType = "none";
        let dependentCoverageType = "none";
        let notes = [];

        if (!eeMedicalEligible) employeeCoverageType = "preMedMedical";
        else if (eeMedicalEligible) employeeCoverageType = "medSupplement";
        else if (eePharmEligible) employeeCoverageType = "pharmacyOnly";

        if (spouseExists) {
          if (!spMedicalEligible && !eeMedicalEligible) spouseCoverageType = "preMedMedical";
          else if (!spMedicalEligible && eeMedicalEligible) spouseCoverageType = "preMedMedical";
          else if (spMedicalEligible) spouseCoverageType = "medSupplement";
          else if (spPharmEligible) spouseCoverageType = "pharmacyOnly";
        }

        if (!eeMedicalEligible && hasOrdDep) dependentCoverageType = "familyPreMedOnly";
        if (hasDisDep) {
          dependentCoverageType = "disabledDependentReviewed";
          notes.push("Approved disabled dependent present: admin review required.");
        }

        if (eeMed.medicalEstimated || spMed.medicalEstimated) notes.push("Medicare medical eligibility used age-based estimate for at least one person.");

        let burn = 0;
        if (employeeCoverageType !== "none") burn += 8;
        if (spouseCoverageType !== "none" && (eeMedicalEligible || spouseCoverageType !== "preMedMedical" || spouseExists)) {
          burn += 8;
        }

        if (burn === 0 || hours < burn) break;
        hours -= burn;

        rows.push({
          rowStartDate: formatDate(rowStartDate),
          rowEndDate: formatDate(rowEndDate),
          employeeCoverageType,
          spouseCoverageType,
          dependentCoverageType,
          programIHoursBurnedThisMonth: burn,
          plansUsed: { section4: medPlan, section4Tier: medCoverage, section5Medical: medicarePlan, section5Pharmacy: pharmacyPlan },
          notes: notes.join(" ")
        });

        cur = addMonths(cur, 1);
      }
      return { rows, remainingHours: hours };
    };

    const determineSection4Outputs = (timeline, inputs) => {
      const eeRows = timeline.filter(r => r.employeeCoverageType === 'preMedMedical');
      const spRows = timeline.filter(r => r.spouseCoverageType === 'preMedMedical');
      return {
        s4_ee_monthsUsed: eeRows.length,
        s4_ee_beginDate: eeRows[0]?.rowStartDate || "",
        s4_ee_endDate: eeRows[eeRows.length-1]?.rowEndDate || "",
        s4_ee_medPlan: inputs.medPlan || "",
        s4_ee_medCoverage: getTier(inputs.medCoverage || "Single"),
        s4_sp_monthsUsed: spRows.length,
        s4_sp_beginDate: spRows[0]?.rowStartDate || "",
        s4_sp_endDate: spRows[spRows.length-1]?.rowEndDate || "",
        s4_sp_medPlan: inputs.medPlan || "",
        s4_sp_medCoverage: getTier(inputs.medCoverage || "Single")
      };
    };

    const determineSection5Outputs = (timeline, inputs) => {
      const eeRows = timeline.filter(r => r.employeeCoverageType === 'medSupplement' || r.employeeCoverageType === 'pharmacyOnly');
      const spRows = timeline.filter(r => r.spouseCoverageType === 'medSupplement' || r.spouseCoverageType === 'pharmacyOnly');
      return {
        s5_ee_monthsUsed: eeRows.length,
        s5_ee_beginDate: eeRows[0]?.rowStartDate || "",
        s5_ee_endDate: eeRows[eeRows.length-1]?.rowEndDate || "",
        s5_ee_medPlan: inputs.s5_ee_medPlan || "Plan 100",
        s5_ee_medPharmacy: inputs.s5_ee_medPharmacy || "Enhanced",
        s5_sp_monthsUsed: spRows.length,
        s5_sp_beginDate: spRows[0]?.rowStartDate || "",
        s5_sp_endDate: spRows[spRows.length-1]?.rowEndDate || "",
        s5_sp_medPlan: inputs.s5_sp_medPlan || "Plan 100",
        s5_sp_medPharmacy: inputs.s5_sp_medPharmacy || "Enhanced"
      };
    };

    const allocateManualMonths = ({ inputs, derived, eeMed, spMed }) => {
      const totalMonths = Math.max(0, Math.floor(num(inputs.coverageMonthsAtRetirement || inputs.manualCoverageMonthsInput)));
      const start = addDays(derived.existingCoverageEndDate, 1);
      let monthsRemaining = totalMonths;
      const rows = [];
      let cur = firstOfMonth(start);

      while (monthsRemaining > 0) {
        const rowStartDate = new Date(cur);
        const rowEndDate = endOfMonth(cur);
        const eeMedMonth = rowStartDate >= firstOfMonth(eeMed.medicalEligible);
        const spMedMonth = inputs.spouseBirthDate && rowStartDate >= firstOfMonth(spMed.medicalEligible);

        rows.push({
          rowStartDate: formatDate(rowStartDate),
          rowEndDate: formatDate(rowEndDate),
          employeeCoverageType: eeMedMonth ? 'medSupplement' : 'preMedMedical',
          spouseCoverageType: !inputs.spouseBirthDate ? 'none' : (spMedMonth ? 'medSupplement' : 'preMedMedical'),
          dependentCoverageType: (!eeMedMonth && (inputs.dependents||[]).length > 0) ? 'familyPreMedOnly' : 'none',
          programIHoursBurnedThisMonth: 8,
          plansUsed: { section4: inputs.medPlan, section4Tier: getTier(inputs.medCoverage), section5Medical: inputs.s5_ee_medPlan || "Plan 100", section5Pharmacy: inputs.s5_ee_medPharmacy || "Enhanced" },
          notes: "Manual month allocation mode."
        });
        monthsRemaining--;
        cur = addMonths(cur, 1);
      }

      return { rows, remainingHours: 0, equivalentCoverageMonthsEstimate: totalMonths };
    };

    const allocateFullSickLeave = ({ inputs, derived, eeMed, spMed }) => {
      const p1 = num(inputs.program1SickHours) + num(inputs.program1ConvertedHours);
      const p2 = num(inputs.program2SickHours) + num(inputs.program2ConvertedHours);
      const p3 = num(inputs.program3SickHours);
      const rate401k = num(inputs.rateFor401kValuation || inputs.hourlyRateAtRetirement || inputs.payRate);

      const k401 = calculate401kAllocation({
        p1Hours: p1, p2Hours: p2, rateFor401kValuation: rate401k,
        annual401kLimit: num(inputs.annual401kLimit),
        currentYear401kContributionsEmployee: num(inputs.currentYear401kContributionsEmployee),
        currentYear401kContributionsEmployer: num(inputs.currentYear401kContributionsEmployer),
        remaining401kRoomOverride: num(inputs.remaining401kRoomOverride),
        final401kContributionAmountOverride: num(inputs.final401kContributionAmountOverride)
      });

      const remainingP2 = Math.max(0, p2 - k401.programIIHoursUsedFor401k);
      const hra = calculateHraAllocation({
        remainingP2Hours: remainingP2,
        hourlyRateAtRetirement: num(inputs.hourlyRateAtRetirement || inputs.payRate),
        avgRetireeRatePreviousCalendarYear: num(inputs.avgRetireeRatePreviousCalendarYear)
      });

      const remainingP1 = calculateProgramIInsuranceBank({ p1Hours: p1, programIHoursUsedFor401k: k401.programIHoursUsedFor401k });

      if (k401.blockedByCap && !num(inputs.final401kContributionAmountOverride)) {
        return {
          blockedByCap: true,
          warning: "401(k) IRS room appears to cap the required contribution. Manual review required before finalizing downstream benefit allocation.",
          k401, p1, p2, p3, remainingP1, remainingP2, hra,
          timeline: { rows: [], remainingHours: remainingP1 }
        };
      }

      const timeline = buildCoverageTimeline({
        startDate: addDays(derived.existingCoverageEndDate, 1),
        programIHours: remainingP1,
        inputs,
        eeMed,
        spMed,
        medPlan: inputs.medPlan,
        medCoverage: getTier(inputs.medCoverage),
        medicarePlan: inputs.s5_ee_medPlan || "Plan 100",
        pharmacyPlan: inputs.s5_ee_medPharmacy || "Enhanced",
        adminConfig: inputs.adminConfig
      });

      return {
        blockedByCap: false,
        k401, p1, p2, p3, remainingP1, remainingP2, hra,
        timeline,
        equivalentCoverageMonthsEstimate: Math.floor(remainingP1/8)
      };
    };

    const validateInputs = (inputs, derived, fullModeResult) => {
      const errors = [];
      const dFields = ["lastDayPaid","hireDate","birthDate","spouseBirthDate","eePartAEffectiveDate","eePartBEffectiveDate","spousePartAEffectiveDate","spousePartBEffectiveDate","pehpEnrollmentReceivedDateEmployee","pehpEnrollmentReceivedDateSpouse"];
      dFields.forEach(f => { if (inputs[f] && !parseDate(inputs[f])) errors.push(`Invalid date: ${f}`); });

      ["program1SickHours","program1ConvertedHours","program2SickHours","program2ConvertedHours","program3SickHours","hourlyRateAtRetirement","annual401kLimit","currentYear401kContributionsEmployee","currentYear401kContributionsEmployer","avgRetireeRatePreviousCalendarYear"].forEach(f=>{
        if (inputs[f] !== "" && num(inputs[f]) < 0) errors.push(`Negative input not allowed: ${f}`);
      });

      if (inputs.calculationMode === 'full-sick-leave') {
        if (!inputs.hourlyRateAtRetirement && !inputs.payRate) errors.push("Full mode requires hourly rate input.");
        if (fullModeResult?.blockedByCap) errors.push("401(k) cap issue without override.");
      }

      if (!inputs.adminConfig.agencyParticipatesInProgramI && (num(inputs.program1SickHours)+num(inputs.program1ConvertedHours) > 0 || num(inputs.coverageMonthsAtRetirement)>0)) {
        errors.push("Program I continuation used when agencyParticipatesInProgramI = false.");
      }

      (inputs.dependents || []).forEach((d, i) => {
        if (d.approvedDisabledDependent && !d.documentationReviewed) errors.push(`Dependent #${i+1} marked approved disabled without documentation/review flag.`);
      });

      const eeMed = inputs.eeHasMedicarePartA && inputs.eeHasMedicarePartB;
      if (inputs.s5_ee_medPlan && !eeMed) errors.push("Employee Medicare medical selected without both Part A and Part B.");
      if (inputs.s5_ee_medPharmacy && !(inputs.eeHasMedicarePartA || inputs.eeHasMedicarePartB)) errors.push("Employee Medicare pharmacy selected without Part A or Part B.");
      if ((inputs.s5_sp_medPlan || inputs.s5_sp_medPharmacy) && !(inputs.spouseHasMedicarePartA || inputs.spouseHasMedicarePartB)) errors.push("Spouse Medicare selected but spouse not eligible.");

      return errors;
    };

    const generateWarnings = ({ inputs, derived, eeMed, spMed, fullModeResult }) => {
      const warnings = [];
      if (eeMed.medicalEstimated || spMed.medicalEstimated) warnings.push("Actual Medicare dates missing for at least one person; age-based estimate used.");
      if ((inputs.dependents || []).some(d => !d.approvedDisabledDependent)) warnings.push("Ordinary dependents terminate when employee reaches Medicare.");
      if ((inputs.dependents || []).some(d => d.approvedDisabledDependent)) warnings.push("Approved disabled dependent present; continuation requires admin review.");
      if (!inputs.adminConfig.allowLowerLevelPlanAtRetirement && inputs.adminConfig.useSamePlanOnlyIfLowerLevelUnknown) warnings.push("Same-or-lower plan rule not provable from config, defaulted to same plan only.");
      if (inputs.adminConfig.employerLegacyCoverageExtensionDays > 0) warnings.push("Employer-specific extension rule is enabled.");
      if (!inputs.adminConfig.earlyRetireePlanCatalog[inputs.medPlan]) warnings.push("Selected plan not found in catalog; admin review required.");
      const triggerEe = firstOfMonth(eeMed.medicalEligible || derived.retirementDate);
      const tEe = isEnrollmentTimely(inputs.pehpEnrollmentReceivedDateEmployee, triggerEe);
      if (!tEe.timely) warnings.push("Employee PEHP enrollment timing may cause lapse.");
      const triggerSp = firstOfMonth(spMed.medicalEligible || derived.retirementDate);
      const tSp = isEnrollmentTimely(inputs.pehpEnrollmentReceivedDateSpouse, triggerSp);
      if (!tSp.timely) warnings.push("Spouse PEHP enrollment timing may cause lapse.");
      if (fullModeResult?.blockedByCap) warnings.push(fullModeResult.warning);
      if (num(inputs.program3SickHours) > 0 && num(inputs.program1SickHours)+num(inputs.program1ConvertedHours)+num(inputs.program2SickHours)+num(inputs.program2ConvertedHours)===0) warnings.push("Program III has no retirement benefit.");
      return warnings;
    };

    const summarizeResults = ({ inputs, derived, eeMed, spMed, allocation, warnings, errors }) => {
      const s4 = determineSection4Outputs(allocation.timeline.rows, inputs);
      const s5 = determineSection5Outputs(allocation.timeline.rows, inputs);
      const monthsToEEMedicare = derived.retirementDate && eeMed.medicalEligible
        ? Math.max(0, (eeMed.medicalEligible.getFullYear() - derived.retirementDate.getFullYear())*12 + (eeMed.medicalEligible.getMonth() - derived.retirementDate.getMonth()))
        : "";
      const monthsToSpouseMedicare = derived.retirementDate && spMed.medicalEligible
        ? Math.max(0, (spMed.medicalEligible.getFullYear() - derived.retirementDate.getFullYear())*12 + (spMed.medicalEligible.getMonth() - derived.retirementDate.getMonth()))
        : "";

      return {
        ...s4, ...s5,
        retirementDate: formatDate(derived.retirementDate),
        ppEndDate: formatDate(derived.ppEndDate),
        planEndDate: formatDate(derived.planEndDate),
        existingCoverageEndDate: formatDate(derived.existingCoverageEndDate),
        extendedCoverageEndDate: formatDate(derived.extendedCoverageEndDate),
        ee65thBirthday: formatDate(addYears(parseDate(inputs.birthDate), 65)),
        spouse65thBirthday: formatDate(addYears(parseDate(inputs.spouseBirthDate), 65)),
        eeMedicareEligibleDate: formatDate(eeMed.medicalEligible),
        spouseMedicareEligibleDate: formatDate(spMed.medicalEligible),
        monthsToEEMedicare,
        monthsToSpouseMedicare,
        remainingCoverageMonths: inputs.calculationMode === 'manual-months' ? Math.max(0, num(inputs.coverageMonthsAtRetirement) - allocation.timeline.rows.length) : Math.floor(allocation.timeline.remainingHours/8),
        statePaidPEHPEndDate: allocation.timeline.rows[allocation.timeline.rows.length-1]?.rowEndDate || "",
        equivalentCoverageMonthsEstimate: allocation.equivalentCoverageMonthsEstimate || Math.floor((num(inputs.remainingProgramIHoursAfter401k)||0)/8),
        assumptionsAndWarnings: warnings,
        auditTimelineRows: allocation.timeline.rows,
        validationErrors: errors
      };
    };

    const addYears = (d, y) => d ? new Date(d.getFullYear()+y, d.getMonth(), d.getDate()) : null;

    const runEngine = (raw) => {
      const inputs = { ...baseForm, ...raw, adminConfig: { ...DEFAULT_ADMIN_CONFIG, ...(raw.adminConfig || {}) } };
      const derived = calculateCoverageEndDates(inputs, inputs.adminConfig);
      const retirementDate = derived.retirementDate || calculateRetirementDateFromLastDayPaid(inputs.lastDayPaid);
      derived.retirementDate = retirementDate;

      const eeBirth = parseDate(inputs.birthDate);
      const spBirth = parseDate(inputs.spouseBirthDate);
      const eeAgeBased = calculateAge65EligibilityDate(eeBirth);
      const spAgeBased = calculateAge65EligibilityDate(spBirth);

      const eeMed = determineMedicareActuals(inputs, eeAgeBased, 'ee');
      const spMed = determineMedicareActuals(inputs, spAgeBased, 'spouse');

      let allocation;
      if (inputs.calculationMode === 'manual-months') {
        allocation = { ...allocateManualMonths({ inputs, derived, eeMed, spMed }), k401: {}, hra: {}, p1: 0, p2: 0, p3: 0, remainingP1: 0, remainingP2: 0 };
      } else {
        allocation = allocateFullSickLeave({ inputs, derived, eeMed, spMed });
      }

      const warnings = generateWarnings({ inputs, derived, eeMed, spMed, fullModeResult: allocation });
      const errors = validateInputs(inputs, derived, allocation);
      const summary = summarizeResults({ inputs, derived, eeMed, spMed, allocation, warnings, errors });

      return {
        inputs,
        derived,
        eeMed,
        spMed,
        allocation,
        summary,
        patches: {
          employeeAgeRetirement: eeBirth && retirementDate ? calculateAge(eeBirth, retirementDate) : "",
          spouseAgeRetirement: spBirth && retirementDate ? calculateAge(spBirth, retirementDate) : "",
          rateFor401kValuation: inputs.rateFor401kValuation || inputs.hourlyRateAtRetirement || inputs.payRate,
          coverageMonthsAtRetirement: inputs.calculationMode === 'manual-months' ? (inputs.coverageMonthsAtRetirement || inputs.manualCoverageMonthsInput) : inputs.coverageMonthsAtRetirement,
          programIHoursUsedFor401k: allocation.k401?.programIHoursUsedFor401k || 0,
          programIIHoursUsedFor401k: allocation.k401?.programIIHoursUsedFor401k || 0,
          programIValueUsedFor401k: allocation.k401?.programIValueUsedFor401k || 0,
          programIIValueUsedFor401k: allocation.k401?.programIIValueUsedFor401k || 0,
          final401kContributionAmount: allocation.k401?.final401k || 0,
          remainingProgramIHoursAfter401k: allocation.remainingP1 || 0,
          remainingProgramIIHoursAfter401k: allocation.remainingP2 || 0,
          hraValuationRateUsed: allocation.hra?.hraValuationRateUsed || 0,
          hraDepositAmount: allocation.hra?.hraDepositAmount || 0,
          ...summary
        }
      };
    };

    // =========================
    // Test Harness
    // =========================
    const runAcceptanceTests = () => {
      const tests = [];
      const mk = (name, fn) => { try { const r = fn(); tests.push({ name, pass: !!r.pass, details: r.details || "" }); } catch (e) { tests.push({ name, pass: false, details: e.message }); } };

      const seed = {
        ...baseForm,
        lastDayPaid: "2026-01-20",
        birthDate: "1964-07-20",
        spouseBirthDate: "1968-02-12",
        medPlan: "Traditional Plan - Advantage Network",
        medCoverage: "Self + Family",
        s5_ee_medPlan: "Plan 100",
        s5_ee_medPharmacy: "Enhanced",
        s5_sp_medPlan: "Plan 75",
        s5_sp_medPharmacy: "Enhanced",
        dependents: [{ name: "Kid", birthDate: "2010-04-01", approvedDisabledDependent: false, documentationReviewed: false }],
        adminConfig: DEFAULT_ADMIN_CONFIG
      };

      mk("1 Manual mode basic", () => {
        const out = runEngine({ ...seed, calculationMode: 'manual-months', coverageMonthsAtRetirement: 12 });
        return { pass: out.summary.auditTimelineRows.length === 12 && num(out.summary.s4_ee_monthsUsed) > 0 };
      });
      mk("2 Employee Medicare before spouse burn 16", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program1SickHours: 400, program2SickHours: 0, hourlyRateAtRetirement: 40, annual401kLimit: 69000, currentYear401kContributionsEmployee: 0, currentYear401kContributionsEmployer: 0 });
        const has16 = out.summary.auditTimelineRows.some(r => r.programIHoursBurnedThisMonth === 16);
        return { pass: has16 };
      });
      mk("3 Both Medicare eligible immediate S5", () => {
        const out = runEngine({ ...seed, birthDate: "1950-01-01", spouseBirthDate: "1950-05-01", eeHasMedicarePartA: true, eePartAEffectiveDate: "2025-01-01", eeHasMedicarePartB: true, eePartBEffectiveDate: "2025-01-01", spouseHasMedicarePartA: true, spousePartAEffectiveDate: "2025-01-01", spouseHasMedicarePartB: true, spousePartBEffectiveDate: "2025-01-01", calculationMode: 'full-sick-leave', program1SickHours: 160, hourlyRateAtRetirement: 40, annual401kLimit: 69000 });
        return { pass: num(out.summary.s4_ee_monthsUsed) === 0 && num(out.summary.s5_ee_monthsUsed) > 0 };
      });
      mk("4 Program II only", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program2SickHours: 300, hourlyRateAtRetirement: 30, annual401kLimit: 69000 });
        return { pass: num(out.patches.hraDepositAmount) > 0 && num(out.patches.s4_ee_monthsUsed) === 0 };
      });
      mk("5 Program III only", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program3SickHours: 100, annual401kLimit: 69000, hourlyRateAtRetirement: 20 });
        return { pass: out.summary.assumptionsAndWarnings.some(w => w.includes("Program III")) };
      });
      mk("6 Mixed P1/P2 converted", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program1SickHours: 120, program1ConvertedHours: 80, program2SickHours: 100, program2ConvertedHours: 100, annual401kLimit: 69000, hourlyRateAtRetirement: 35 });
        return { pass: num(out.patches.programIIHoursUsedFor401k) >= 0 && num(out.patches.remainingProgramIIHoursAfter401k) >= 0 && num(out.patches.remainingProgramIHoursAfter401k) >= 0 };
      });
      mk("7 401k cap binds", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program1SickHours: 1000, hourlyRateAtRetirement: 50, annual401kLimit: 2000, currentYear401kContributionsEmployee: 1900, currentYear401kContributionsEmployer: 100 });
        return { pass: out.summary.validationErrors.some(e => e.includes("401(k) cap")) };
      });
      mk("8 Early disability Medicare", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', eeHasMedicarePartA: true, eePartAEffectiveDate: "2026-03-01", eeHasMedicarePartB: true, eePartBEffectiveDate: "2026-03-01", eeHasEarlyMedicareDisability: true, program1SickHours: 160, hourlyRateAtRetirement: 40, annual401kLimit: 69000 });
        return { pass: out.summary.eeMedicareEligibleDate === "2026-03-01" };
      });
      mk("9 Pharmacy-only eligibility", () => {
        const out = runEngine({ ...seed, eeHasMedicarePartA: true, eePartAEffectiveDate: "2026-02-01", eeHasMedicarePartB: false, calculationMode: 'full-sick-leave', program1SickHours: 160, hourlyRateAtRetirement: 30, annual401kLimit: 69000 });
        return { pass: out.summary.validationErrors.some(e => e.includes("medical")) && !out.summary.validationErrors.some(e => e.includes("pharmacy")) };
      });
      mk("10 Dependents terminate at employee Medicare", () => {
        const out = runEngine({ ...seed, calculationMode: 'full-sick-leave', program1SickHours: 500, hourlyRateAtRetirement: 25, annual401kLimit: 69000 });
        const hasFamily = out.summary.auditTimelineRows.some(r => r.dependentCoverageType === "familyPreMedOnly");
        const hasPostNone = out.summary.auditTimelineRows.some(r => r.employeeCoverageType !== "preMedMedical" && r.dependentCoverageType === "none");
        return { pass: hasFamily && hasPostNone };
      });
      mk("11 Legacy extension on", () => {
        const out = runEngine({ ...seed, hireDate: "2000-01-01" });
        return { pass: out.summary.existingCoverageEndDate !== out.summary.planEndDate };
      });
      mk("12 Legacy extension off", () => {
        const out = runEngine({ ...seed, hireDate: "2000-01-01", adminConfig: { ...DEFAULT_ADMIN_CONFIG, employerLegacyCoverageExtensionDays: 0 } });
        return { pass: out.summary.existingCoverageEndDate === out.summary.planEndDate };
      });
      mk("13 Same-plan-only", () => {
        const out = runEngine({ ...seed });
        return { pass: out.summary.assumptionsAndWarnings.some(w => w.includes("same plan")) };
      });
      mk("14 Summary rendering no spouse", () => {
        const out = runEngine({ ...seed, spouseBirthDate: "", spouseName: "", spouseFirstName: "" });
        return { pass: typeof out.summary.s4_sp_monthsUsed !== 'undefined' };
      });
      mk("15 Backward compatibility", () => {
        const old = { employeeName: "Legacy", lastDayPaid: "2026-01-10", birthDate: "1963-01-01", coverageMonthsAtRetirement: 24, calculationMode: "manual-months" };
        const out = runEngine(old);
        return { pass: out.summary.auditTimelineRows.length > 0 };
      });

      return tests;
    };

    // =========================
    // UI Components
    // =========================
    const Field = ({label, value, onChange, type="text", readOnly=false}) => (
      <div>
        <label className="lbl block mb-1">{label}</label>
        <input className="w-full border rounded px-2 py-1 text-sm" type={type} value={value ?? ""} readOnly={readOnly} onChange={onChange} />
      </div>
    );
    const Check = ({label, value, onChange}) => (
      <label className="flex items-center gap-2 text-sm"><input type="checkbox" checked={!!value} onChange={onChange} />{label}</label>
    );

    function App() {
      const [form, setForm] = useState(() => {
        const persisted = document.getElementById('persisted-data')?.textContent?.trim();
        if (persisted) {
          try { return { ...baseForm, ...JSON.parse(persisted), adminConfig: { ...DEFAULT_ADMIN_CONFIG, ...(JSON.parse(persisted).adminConfig || {}) } }; }
          catch { return baseForm; }
        }
        return baseForm;
      });
      const [csvRows, setCsvRows] = useState([]);
      const [showSummary, setShowSummary] = useState(false);
      const [testResults, setTestResults] = useState([]);

      const engine = useMemo(() => runEngine(form), [form]);
      useEffect(() => {
        setForm(prev => ({ ...prev, ...engine.patches }));
      }, [engine.patches.retirementDate, engine.patches.final401kContributionAmount, engine.patches.s4_ee_monthsUsed]);

      const setField = (k, v) => setForm(f => ({ ...f, [k]: v }));

      const saveDraft = () => {
        const json = JSON.stringify(form, null, 2);
        document.getElementById('persisted-data').textContent = json;
        alert('Draft saved in embedded JSON. Use Save As to export HTML.');
      };
      const saveAs = () => {
        const persistedOpenTag = '<script id="persisted-data" type="application/json">';
        const persistedCloseTag = '</' + 'script>';
        const persistedPayload = `${persistedOpenTag}${JSON.stringify(form)}${persistedCloseTag}`;
        const html = document.documentElement.outerHTML.replace(`${persistedOpenTag}${persistedCloseTag}`, persistedPayload);
        const blob = new Blob([html], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `retirement-worksheet-${(form.employeeName||'draft').replace(/\s+/g,'_')}.html`;
        a.click();
        URL.revokeObjectURL(a.href);
      };

      const handleOpenFile = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          const text = String(reader.result || '');
          const m = text.match(/<script id="persisted-data" type="application\/json">([\s\S]*?)<\/script>/);
          if (!m) return alert('No embedded draft data found.');
          try {
            const parsed = JSON.parse(m[1]);
            setForm({ ...baseForm, ...parsed, adminConfig: { ...DEFAULT_ADMIN_CONFIG, ...(parsed.adminConfig || {}) } });
          } catch { alert('Invalid persisted JSON.'); }
        };
        reader.readAsText(file);
      };

      const handleCsv = (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = () => {
          const lines = String(r.result||'').trim().split(/\r?\n/);
          if (!lines.length) return;
          const headers = lines[0].split(',').map(s=>s.trim());
          const rows = lines.slice(1).map(line => {
            const vals = line.split(',');
            const obj = {};
            headers.forEach((h,i)=>obj[h]=vals[i]?.trim()||"");
            return obj;
          });
          setCsvRows(rows);
        };
        r.readAsText(file);
      };

      const lookupEmployee = (personnelNumber) => {
        const row = csvRows.find(r => (r.personnelNumber || r.PersonnelNumber || r.personnel_number) === personnelNumber);
        if (!row) return;
        setForm(f => ({ ...f,
          personnelNumber: row.personnelNumber || row.PersonnelNumber || f.personnelNumber,
          employeeName: row.employeeName || row.EmployeeName || f.employeeName,
          empSSN: row.empSSN || row.SSN || f.empSSN,
          birthDate: row.birthDate || row.BirthDate || f.birthDate,
          medPlan: row.medPlan || row.MedPlan || f.medPlan,
          medCoverage: row.medCoverage || row.MedCoverage || f.medCoverage,
          deptUnit: row.deptUnit || f.deptUnit,
          deptName: row.deptName || f.deptName
        }));
      };

      const disabledSummary = engine.summary.validationErrors.length > 0;

      return (
        <div className="max-w-7xl mx-auto p-4 print-full">
          <div className="bg-white rounded-lg shadow p-4 no-print">
            <div className="flex flex-wrap gap-2 justify-between items-center">
              <h1 className="text-xl font-bold">Retirement Worksheet (Manual + Full Sick Leave)</h1>
              <div className="flex gap-2">
                <button className="px-3 py-1 bg-blue-700 text-white rounded" onClick={saveDraft}>Save Draft</button>
                <button className="px-3 py-1 bg-indigo-700 text-white rounded" onClick={saveAs}>Save As HTML</button>
                <input type="file" accept=".html" onChange={handleOpenFile} className="text-sm" />
                <input type="file" accept=".csv" onChange={handleCsv} className="text-sm" />
                <button className="px-3 py-1 bg-slate-700 text-white rounded" onClick={()=>setShowSummary(s=>!s)}>{showSummary ? "Entry View" : "Summary View"}</button>
                <button className="px-3 py-1 bg-emerald-700 text-white rounded" onClick={()=>window.print()}>Print</button>
              </div>
            </div>
            <div className="mt-3 grid grid-cols-1 md:grid-cols-4 gap-3">
              <Field label="Personnel Number" value={form.personnelNumber} onChange={e=>setField('personnelNumber', e.target.value)} />
              <button className="px-3 py-1 bg-slate-200 rounded self-end" onClick={()=>lookupEmployee(form.personnelNumber)}>Lookup from CSV</button>
              <div className="md:col-span-2">
                <label className="lbl block mb-1">Calculation Mode</label>
                <select className="w-full border rounded px-2 py-1" value={form.calculationMode} onChange={e=>setField('calculationMode', e.target.value)}>
                  <option value="manual-months">Manual Coverage Months</option>
                  <option value="full-sick-leave">Full Sick Leave Calculation</option>
                </select>
              </div>
            </div>
          </div>

          {!showSummary && <div className="space-y-4 mt-4">
            <Section title="Section 1 - Employee Information">
              <Grid>
                <Field label="Employee Name" value={form.employeeName} onChange={e=>setField('employeeName', e.target.value)} />
                <Field label="Employee SSN" value={form.empSSN} onChange={e=>setField('empSSN', e.target.value)} />
                <Field label="Group" value={form.eeGroup} onChange={e=>setField('eeGroup', e.target.value)} />
                <Field label="Birth Date" type="date" value={form.birthDate} onChange={e=>setField('birthDate', e.target.value)} />
                <Field label="Hire Date" type="date" value={form.hireDate} onChange={e=>setField('hireDate', e.target.value)} />
                <Field label="Last Day Paid" type="date" value={form.lastDayPaid} onChange={e=>setField('lastDayPaid', e.target.value)} />
                <Field label="Retirement Date" type="date" value={form.retirementDate} onChange={e=>setField('retirementDate', e.target.value)} />
                <Field label="Pay Rate" value={form.payRate} onChange={e=>setField('payRate', e.target.value)} />
                <Field label="Hourly Rate at Retirement" value={form.hourlyRateAtRetirement} onChange={e=>setField('hourlyRateAtRetirement', e.target.value)} />
                <Field label="Department Unit" value={form.deptUnit} onChange={e=>setField('deptUnit', e.target.value)} />
                <Field label="Department Name" value={form.deptName} onChange={e=>setField('deptName', e.target.value)} />
                <Field label="Employee Age at Retirement" value={form.employeeAgeRetirement} onChange={()=>{}} readOnly />
              </Grid>
            </Section>

            <Section title="Section 2 - Criteria for Continuation">
              <Grid>
                <Field label="Medical Plan" value={form.medPlan} onChange={e=>setField('medPlan', e.target.value)} />
                <Field label="Medical Coverage" value={form.medCoverage} onChange={e=>setField('medCoverage', e.target.value)} />
                <Field label="PP End Date" value={form.ppEndDate} readOnly onChange={()=>{}} />
                <Field label="Plan End Date" value={form.planEndDate} readOnly onChange={()=>{}} />
                <Field label="Existing Coverage End Date" value={form.existingCoverageEndDate} readOnly onChange={()=>{}} />
                <Field label="Extended Coverage End Date" value={form.extendedCoverageEndDate} readOnly onChange={()=>{}} />
                <Field label="Employee 65th Birthday" value={form.ee65thBirthday} readOnly onChange={()=>{}} />
                <Field label="Spouse 65th Birthday" value={form.spouse65thBirthday} readOnly onChange={()=>{}} />
                <Check label="Decline Coverage" value={form.declineCoverage} onChange={e=>setField('declineCoverage', e.target.checked)} />
                <Check label="Death Benefit / Transfer" value={form.isDeathBenefit} onChange={e=>setField('isDeathBenefit', e.target.checked)} />
              </Grid>
            </Section>

            <Section title="Dependents">
              <button className="no-print mb-2 px-2 py-1 bg-slate-200 rounded" onClick={()=>setField('dependents', [...(form.dependents||[]), {name:'', birthDate:'', approvedDisabledDependent:false, documentationReviewed:false}])}>Add Dependent</button>
              <div className="space-y-2">
                {(form.dependents||[]).map((d, i) => (
                  <div key={i} className="grid grid-cols-1 md:grid-cols-6 gap-2 border rounded p-2">
                    <Field label="Name" value={d.name||''} onChange={e=>{
                      const arr=[...(form.dependents||[])]; arr[i]={...arr[i],name:e.target.value}; setField('dependents', arr);
                    }}/>
                    <Field label="Birth Date" type="date" value={d.birthDate||''} onChange={e=>{const arr=[...(form.dependents||[])]; arr[i]={...arr[i],birthDate:e.target.value}; setField('dependents', arr);}}/>
                    <Check label="Approved Disabled" value={d.approvedDisabledDependent} onChange={e=>{const arr=[...(form.dependents||[])]; arr[i]={...arr[i],approvedDisabledDependent:e.target.checked}; setField('dependents', arr);}}/>
                    <Check label="Documentation Reviewed" value={d.documentationReviewed} onChange={e=>{const arr=[...(form.dependents||[])]; arr[i]={...arr[i],documentationReviewed:e.target.checked}; setField('dependents', arr);}}/>
                    <button className="px-2 py-1 bg-red-100 rounded self-end" onClick={()=>setField('dependents', (form.dependents||[]).filter((_,idx)=>idx!==i))}>Remove</button>
                  </div>
                ))}
              </div>
            </Section>

            <Section title="Section 3 - Life Insurance">
              <Grid>
                <Check label="Agency Participates in Program I" value={form.adminConfig.agencyParticipatesInProgramI} onChange={e=>setField('adminConfig', {...form.adminConfig, agencyParticipatesInProgramI: e.target.checked})} />
                <Field label="State Paid PEHP End Date" value={form.statePaidPEHPEndDate} readOnly onChange={()=>{}} />
              </Grid>
            </Section>

            <Section title="Section 4 - Health Insurance Continuation">
              <Grid>
                <Field label="EE Months Used" value={form.s4_ee_monthsUsed} readOnly onChange={()=>{}} />
                <Field label="EE Begin" value={form.s4_ee_beginDate} readOnly onChange={()=>{}} />
                <Field label="EE End" value={form.s4_ee_endDate} readOnly onChange={()=>{}} />
                <Field label="EE Plan" value={form.s4_ee_medPlan} readOnly onChange={()=>{}} />
                <Field label="EE Coverage" value={form.s4_ee_medCoverage} readOnly onChange={()=>{}} />
                <Field label="Spouse Months Used" value={form.s4_sp_monthsUsed} readOnly onChange={()=>{}} />
                <Field label="Spouse Begin" value={form.s4_sp_beginDate} readOnly onChange={()=>{}} />
                <Field label="Spouse End" value={form.s4_sp_endDate} readOnly onChange={()=>{}} />
              </Grid>
            </Section>

            <Section title="Section 5 - Medicare Supplement">
              <Grid>
                <Field label="EE Med Plan" value={form.s5_ee_medPlan} onChange={e=>setField('s5_ee_medPlan', e.target.value)} />
                <Field label="EE Pharmacy" value={form.s5_ee_medPharmacy} onChange={e=>setField('s5_ee_medPharmacy', e.target.value)} />
                <Field label="EE Months Used" value={form.s5_ee_monthsUsed} readOnly onChange={()=>{}} />
                <Field label="EE Begin" value={form.s5_ee_beginDate} readOnly onChange={()=>{}} />
                <Field label="EE End" value={form.s5_ee_endDate} readOnly onChange={()=>{}} />
                <Field label="Sp Med Plan" value={form.s5_sp_medPlan} onChange={e=>setField('s5_sp_medPlan', e.target.value)} />
                <Field label="Sp Pharmacy" value={form.s5_sp_medPharmacy} onChange={e=>setField('s5_sp_medPharmacy', e.target.value)} />
                <Field label="Sp Months Used" value={form.s5_sp_monthsUsed} readOnly onChange={()=>{}} />
              </Grid>
            </Section>

            <Section title="Calculation Inputs">
              <Grid>
                {form.calculationMode === 'manual-months' ? <>
                  <Field label="Coverage Months at Retirement" value={form.coverageMonthsAtRetirement} onChange={e=>setField('coverageMonthsAtRetirement', e.target.value)} />
                  <Field label="Manual Coverage Months Input" value={form.manualCoverageMonthsInput} onChange={e=>setField('manualCoverageMonthsInput', e.target.value)} />
                </> : <>
                  <Field label="Program I Sick Hours" value={form.program1SickHours} onChange={e=>setField('program1SickHours', e.target.value)} />
                  <Field label="Program I Converted Hours" value={form.program1ConvertedHours} onChange={e=>setField('program1ConvertedHours', e.target.value)} />
                  <Field label="Program II Sick Hours" value={form.program2SickHours} onChange={e=>setField('program2SickHours', e.target.value)} />
                  <Field label="Program II Converted Hours" value={form.program2ConvertedHours} onChange={e=>setField('program2ConvertedHours', e.target.value)} />
                  <Field label="Program III Sick Hours" value={form.program3SickHours} onChange={e=>setField('program3SickHours', e.target.value)} />
                  <Field label="Rate for 401(k) Valuation" value={form.rateFor401kValuation} onChange={e=>setField('rateFor401kValuation', e.target.value)} />
                  <Field label="Annual 401(k) Limit" value={form.annual401kLimit} onChange={e=>setField('annual401kLimit', e.target.value)} />
                  <Field label="Current Year EE 401(k)" value={form.currentYear401kContributionsEmployee} onChange={e=>setField('currentYear401kContributionsEmployee', e.target.value)} />
                  <Field label="Current Year ER 401(k)" value={form.currentYear401kContributionsEmployer} onChange={e=>setField('currentYear401kContributionsEmployer', e.target.value)} />
                  <Field label="Remaining 401(k) Room Override" value={form.remaining401kRoomOverride} onChange={e=>setField('remaining401kRoomOverride', e.target.value)} />
                  <Field label="Final 401(k) Contribution Override" value={form.final401kContributionAmountOverride} onChange={e=>setField('final401kContributionAmountOverride', e.target.value)} />
                  <Field label="Avg Retiree Rate Prev Year" value={form.avgRetireeRatePreviousCalendarYear} onChange={e=>setField('avgRetireeRatePreviousCalendarYear', e.target.value)} />
                </>}
              </Grid>

              <h3 className="font-semibold mt-3">Medicare Actual Enrollment</h3>
              <Grid>
                <Check label="EE Part A" value={form.eeHasMedicarePartA} onChange={e=>setField('eeHasMedicarePartA', e.target.checked)} />
                <Field label="EE Part A Effective" type="date" value={form.eePartAEffectiveDate} onChange={e=>setField('eePartAEffectiveDate', e.target.value)} />
                <Check label="EE Part B" value={form.eeHasMedicarePartB} onChange={e=>setField('eeHasMedicarePartB', e.target.checked)} />
                <Field label="EE Part B Effective" type="date" value={form.eePartBEffectiveDate} onChange={e=>setField('eePartBEffectiveDate', e.target.value)} />
                <Check label="EE Early Medicare Disability" value={form.eeHasEarlyMedicareDisability} onChange={e=>setField('eeHasEarlyMedicareDisability', e.target.checked)} />
                <Field label="EE PEHP Enrollment Received" type="date" value={form.pehpEnrollmentReceivedDateEmployee} onChange={e=>setField('pehpEnrollmentReceivedDateEmployee', e.target.value)} />
                <Check label="Spouse Part A" value={form.spouseHasMedicarePartA} onChange={e=>setField('spouseHasMedicarePartA', e.target.checked)} />
                <Field label="Spouse Part A Effective" type="date" value={form.spousePartAEffectiveDate} onChange={e=>setField('spousePartAEffectiveDate', e.target.value)} />
                <Check label="Spouse Part B" value={form.spouseHasMedicarePartB} onChange={e=>setField('spouseHasMedicarePartB', e.target.checked)} />
                <Field label="Spouse Part B Effective" type="date" value={form.spousePartBEffectiveDate} onChange={e=>setField('spousePartBEffectiveDate', e.target.value)} />
                <Check label="Spouse Early Medicare Disability" value={form.spouseHasEarlyMedicareDisability} onChange={e=>setField('spouseHasEarlyMedicareDisability', e.target.checked)} />
                <Field label="Spouse PEHP Enrollment Received" type="date" value={form.pehpEnrollmentReceivedDateSpouse} onChange={e=>setField('pehpEnrollmentReceivedDateSpouse', e.target.value)} />
              </Grid>

              <details className="mt-3">
                <summary className="cursor-pointer font-semibold">Admin Config (editable JSON)</summary>
                <textarea className="w-full border rounded p-2 text-xs h-56 mt-2" value={JSON.stringify(form.adminConfig, null, 2)} onChange={e=>{
                  try { const parsed = JSON.parse(e.target.value); setField('adminConfig', parsed); } catch {}
                }} />
              </details>
            </Section>

            <Section title="Calculation Audit">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-2 text-sm">
                <div>Program I starting hours: <b>{num(form.program1SickHours)+num(form.program1ConvertedHours)}</b></div>
                <div>Program II starting hours: <b>{num(form.program2SickHours)+num(form.program2ConvertedHours)}</b></div>
                <div>Program III informational hours: <b>{num(form.program3SickHours)}</b></div>
                <div>401(k) target: <b>{(engine.allocation.k401?.target401k || 0).toFixed(2)}</b></div>
                <div>401(k) final: <b>{(engine.allocation.k401?.final401k || 0).toFixed(2)}</b></div>
                <div>P2 hours used for 401(k): <b>{(engine.allocation.k401?.programIIHoursUsedFor401k || 0).toFixed(2)}</b></div>
                <div>P1 hours used for 401(k): <b>{(engine.allocation.k401?.programIHoursUsedFor401k || 0).toFixed(2)}</b></div>
                <div>Remaining Program II HRA: <b>{(form.hraDepositAmount || 0).toString()}</b></div>
                <div>Remaining Program I insurance hours: <b>{(form.remainingProgramIHoursAfter401k || 0).toString()}</b></div>
              </div>
              <div className="overflow-x-auto mt-2">
                <table className="min-w-full text-xs border">
                  <thead className="bg-slate-100"><tr>
                    <th className="border px-2">Start</th><th className="border px-2">End</th><th className="border px-2">EE</th><th className="border px-2">SP</th><th className="border px-2">Deps</th><th className="border px-2">Burn</th><th className="border px-2">Notes</th>
                  </tr></thead>
                  <tbody>
                    {(form.auditTimelineRows||[]).map((r, i)=><tr key={i}>
                      <td className="border px-2">{r.rowStartDate}</td><td className="border px-2">{r.rowEndDate}</td><td className="border px-2">{r.employeeCoverageType}</td><td className="border px-2">{r.spouseCoverageType}</td><td className="border px-2">{r.dependentCoverageType}</td><td className="border px-2">{r.programIHoursBurnedThisMonth}</td><td className="border px-2">{r.notes}</td>
                    </tr>)}
                  </tbody>
                </table>
              </div>
              <ul className="list-disc ml-6 mt-2 text-sm">
                {(form.assumptionsAndWarnings||[]).map((w,i)=><li key={i}>{w}</li>)}
              </ul>
            </Section>

            <Section title="Developer Test Harness">
              <button className="px-3 py-1 bg-emerald-700 text-white rounded" onClick={()=>setTestResults(runAcceptanceTests())}>Run Built-in Tests</button>
              <div className="mt-2 space-y-1 text-sm">
                {testResults.map((t,i)=><div key={i} className={t.pass?"text-emerald-700":"text-red-700"}>{t.pass?"PASS":"FAIL"} - {t.name} {t.details?`(${t.details})`:''}</div>)}
              </div>
            </Section>
          </div>}

          {showSummary && <div className="bg-white rounded shadow p-4 mt-4">
            {disabledSummary && <div className="p-2 bg-red-50 border border-red-300 text-red-700 rounded mb-3">Summary blocked due to validation errors.<ul className="list-disc ml-6">{engine.summary.validationErrors.map((e,i)=><li key={i}>{e}</li>)}</ul></div>}
            <h2 className="font-bold text-lg mb-2">Summary / Print View</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 text-sm">
              <Card title="Employee Information"><KV k="Name" v={form.employeeName} /><KV k="Personnel" v={form.personnelNumber} /><KV k="Birth" v={form.birthDate} /><KV k="Retirement" v={form.retirementDate} /></Card>
              <Card title="Spouse Information"><KV k="Name" v={form.spouseFirstName || form.spouseName} /><KV k="Birth" v={form.spouseBirthDate} /><KV k="Medicare Eligible" v={form.spouseMedicareEligibleDate} /></Card>
              <Card title="Coverage Criteria"><KV k="Mode" v={form.calculationMode} /><KV k="Plan" v={form.medPlan} /><KV k="Tier" v={form.medCoverage} /><KV k="State Paid End" v={form.statePaidPEHPEndDate} /></Card>
              <Card title="Section 4"><KV k="EE Months" v={form.s4_ee_monthsUsed} /><KV k="EE Begin" v={form.s4_ee_beginDate} /><KV k="EE End" v={form.s4_ee_endDate} /><KV k="Spouse Months" v={form.s4_sp_monthsUsed} /></Card>
              <Card title="Section 5"><KV k="EE Months" v={form.s5_ee_monthsUsed} /><KV k="EE Begin" v={form.s5_ee_beginDate} /><KV k="EE End" v={form.s5_ee_endDate} /><KV k="Spouse Months" v={form.s5_sp_monthsUsed} /></Card>
              <Card title="Life Insurance / Full Mode Values"><KV k="Final 401(k)" v={form.final401kContributionAmount} /><KV k="HRA Deposit" v={form.hraDepositAmount} /><KV k="Remaining Program I Hours" v={form.remainingProgramIHoursAfter401k} /><KV k="Equivalent Coverage Months" v={form.equivalentCoverageMonthsEstimate} /></Card>
              <Card title="Dependents" className="md:col-span-2">{(form.dependents||[]).length===0?"None":(form.dependents||[]).map((d,i)=><div key={i}>{d.name} ({d.birthDate}) {d.approvedDisabledDependent?"[Disabled Approved]":""}</div>)}</Card>
              <Card title="Warnings / Assumptions" className="md:col-span-2"><ul className="list-disc ml-5">{(form.assumptionsAndWarnings||[]).map((w,i)=><li key={i}>{w}</li>)}</ul></Card>
            </div>
          </div>}
        </div>
      );
    }

    const Section = ({title, children}) => <div className="bg-white rounded shadow p-4"><h2 className="font-semibold mb-2">{title}</h2>{children}</div>;
    const Grid = ({children}) => <div className="grid grid-cols-1 md:grid-cols-4 gap-2">{children}</div>;
    const Card = ({title, children, className=""}) => <div className={`border rounded p-2 ${className}`}><h3 className="font-semibold mb-1">{title}</h3>{children}</div>;
    const KV = ({k, v}) => <div><span className="text-xs uppercase text-slate-500">{k}:</span> <span className="font-medium">{String(v || '---')}</span></div>;

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
